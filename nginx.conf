server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Important for Flutter Web: This sends all unmatched routes directly to index.html
    # This ensures that deep linking like /dashboard works when reloading the page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
